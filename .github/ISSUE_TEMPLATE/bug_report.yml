name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear and concise description.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Go version, OS, library version.
    validations:
      required: true
